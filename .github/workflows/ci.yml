name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: pytest tests/ -v --tb=short

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint src/
        run: ruff check src/ --select E,W,F --ignore E501,W503

      - name: Lint app/
        run: ruff check app/ --select E,W,F --ignore E501,W503
