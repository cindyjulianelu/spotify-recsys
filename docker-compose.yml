version: "3.11"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # Mount data/ and models/ so the container sees trained models
      # and data files without baking them into the image layer.
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
